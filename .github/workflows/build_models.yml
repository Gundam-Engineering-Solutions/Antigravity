name: Build Type-S 3D Models

# Trigger the workflow on every push to the main branch
on:
  push:
    branches:
      - main
    paths:
      - '*.scad' # Only run if a .scad file changes

jobs:
  render_models:
    name: Render OpenSCAD to STL
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository content
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Install OpenSCAD on the Linux runner
      - name: Install OpenSCAD
        run: |
          sudo apt-get update
          sudo apt-get install -y openscad

      # 3. Create output directory
      - name: Create STL Directory
        run: mkdir -p stl_output

      # 4. Run OpenSCAD via Command Line
      - name: Render Type-S V2 Components
        run: |
          # Render the Full Ship (For Display/Desktop Model)
          openscad -o stl_output/type_s_full_assembly.stl assembly_v2.scad
          
          # Render The Hull Ring (For Large Format Printing)
          openscad -o stl_output/hull_ring_v2.stl type_s_saiya_v2.scad
          
          # Render The Server Core (For Resin Printing)
          openscad -o stl_output/server_core_v2.stl central_hub_saiya_v2.scad
          
          echo "Render Complete: Full Assembly, Hull, and Core."

      # 5. Save the STL as an Artifact
      # You can download this from the "Actions" tab in GitHub
      - name: Upload STL Artifact
        uses: actions/upload-artifact@v3
        with:
          name: type-s-hull-stl
          path: stl_output/*.stl
          retention-days: 5
